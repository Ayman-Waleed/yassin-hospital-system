<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إدارة الشكاوى والمقترحات | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        header {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th,
        td {
            padding: 14px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        th {
            background: #f8fafc;
            color: #64748b;
        }

        .reply-input {
            width: 70%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Cairo';
        }

        .btn-reply {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header>
        <h1 style="margin:0; font-size:22px;">إدارة الشكاوى وردود المرضى ✍️</h1>
        <a href="dashboard.html" style="color:white; text-decoration:none; font-weight:bold;">🔙 العودة للرئيسية</a>
    </header>

    <div class="container">
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>المريض</th>
                        <th>الجوال</th>
                        <th>نص الشكوى</th>
                        <th>الحالة</th>
                        <th>الرد الإداري</th>
                    </tr>
                </thead>
                <tbody id="complaintsTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadComplaints() {
            const res = await fetch('http://localhost:5000/api/complaints');
            const data = await res.json();
            const tbody = document.getElementById('complaintsTable');

            tbody.innerHTML = data.map(c => {
                const isReplied = c.status === 'replied';
                const badge = isReplied
                    ? '<span class="status-badge" style="background:#d1fae5; color:#065f46;">تم الرد</span>'
                    : '<span class="status-badge" style="background:#fef3c7; color:#d97706;"> بانتظار الرد</span>';

                // إذا تم الرد، نعرض النص. إذا لم يتم الرد، نعرض حقل إدخال وزر
                const actionHtml = isReplied
                    ? `<span style="color:#0369a1; font-weight:bold;">${c.admin_reply}</span>`
                    : `<div style="display:flex; gap:5px;">
                           <input type="text" id="reply-${c.id}" class="reply-input" placeholder="اكتب ردك هنا...">
                           <button onclick="sendReply(${c.id})" class="btn-reply">إرسال</button>
                       </div>`;

                return `
                    <tr>
                        <td style="font-weight:bold;">${c.patient_name}</td>
                        <td dir="ltr">${c.patient_phone}</td>
                        <td>${c.complaint_text}</td>
                        <td>${badge}</td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        async function sendReply(id) {
            const replyText = document.getElementById(`reply-${id}`).value.trim();
            if (!replyText) return alert('الرجاء كتابة الرد أولاً');

            await fetch('http://localhost:5000/api/complaints/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, reply: replyText })
            });

            alert('تم إرسال الرد للمريض بنجاح ✅');
            loadComplaints(); // تحديث الجدول فوراً
        }

        // مثال داخل دالة إرسال الرد في صفحة الإدارة
        async function submitReply(complaintId) {
            const replyText = document.getElementById(`replyInput-${complaintId}`).value;

            const response = await fetch('http://localhost:5000/api/complaints/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: complaintId, reply: replyText })
            });

            if (response.ok) {
                alert("تم الرد بنجاح!");
                loadComplaints();
            }
        }

        window.onload = loadComplaints;
    </script>
</body>

</html>
