<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المواعيد - الياسين الطبي</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar" id="sidebar-nav"></nav>
        <div class="main-content">
            <header>
                <h2>جدولة المواعيد</h2>
                <div class="user-info">مرحباً، مدير النظام</div>
            </header>
            
            <div class="table-container animate-fade-in">
                <div class="table-header">
                    <h3>سجل المواعيد</h3>
                    <button class="btn btn-add" onclick="openModal('add-appointment-modal')">+ إضافة موعد</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>التاريخ</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <!-- أُضيف للربط مع الباك اند: الصفوف تتعبأ من قاعدة البيانات -->
                    <tbody id="appointments-table-body">
                    </tbody>
                </table>
            </div>

            <footer>
                <span class="footer-brand">الياسين الطبي © 2026</span>
                <span class="footer-copy">All rights reserved. Designed for Al-Yaseen Medical system.</span>
            </footer>
        </div>
    </div>

    <!-- Modal: Add Appointment -->
    <div class="modal-overlay" id="add-appointment-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>إضافة موعد جديد</h3>
                <button class="modal-close" onclick="closeModal('add-appointment-modal')">&times;</button>
            </div>
            <form id="add-appointment-form" onsubmit="saveAppointment(event)">
                <div class="modal-body">
                    <div class="input-group">
                        <label>اسم المريض</label>
                        <input type="text" id="appt-patient" required placeholder="مثال: يوسف أحمد">
                    </div>
                    <!-- أُضيف للربط مع الباك اند: اختيار الطبيب من القاعدة بدل الكتابة اليدوية
                         حتى يرتبط الموعد برقم الطبيب الصحيح -->
                    <div class="input-group">
                        <label>اسم الطبيب</label>
                        <select id="appt-doctor" required>
                            <option value="" disabled selected>اختر الطبيب</option>
                        </select>
                    </div>
                    <!-- أُضيف للربط مع الباك اند: التاريخ أصبح تاريخاً ووقتاً معاً
                         لأن الموعد في القاعدة يشمل وقت الكشف -->
                    <div class="input-group">
                        <label>تاريخ ووقت الموعد</label>
                        <input type="datetime-local" id="appt-date" required>
                    </div>
                    <div class="input-group">
                        <label>حالة الموعد</label>
                        <select id="appt-status" required>
                            <option value="تم الفحص">تم الفحص</option>
                            <option value="انتظار">انتظار</option>
                            <!-- أُضيف للربط مع الباك اند: حالة "مؤكد" موجودة في القاعدة -->
                            <option value="مؤكد">مؤكد</option>
                            <option value="ملغى">ملغى</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-delete" onclick="closeModal('add-appointment-modal')">إلغاء</button>
                    <button type="submit" class="btn btn-add">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
