<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي للطبيب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .profile-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        .profile-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0284c7;
        }

        .info {
            margin-top: 20px;
            text-align: right;
        }

        .info p {
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 10px;
            color: #1e293b;
        }
    </style>
</head>

<body>
    <div class="profile-card" id="profileData">
        <h2>جاري التحميل...</h2>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        async function loadProfile() {
            // ملاحظة: ستحتاج لإنشاء مسار GET /api/doctors/:id في الباك اند
            const res = await fetch(`http://localhost:5000/api/doctors/${docId}`);
            const doc = await res.json();

            document.getElementById('profileData').innerHTML = `
                <img src="http://localhost:5000${doc.image_url}" alt="صورة الطبيب">
                <h2 style="color:#0284c7;">${doc.name}</h2>
                <div class="info">
                    <p><strong>🩺 التخصص:</strong> ${doc.specialization}</p>
                    <p><strong>🏥 العيادة:</strong> ${doc.clinic_name}</p>
                    <p><strong>📞 الجوال للتواصل:</strong> ${doc.phone || 'غير مسجل'}</p>
                </div>
                <a href="doctors.html" style="display:block; margin-top:20px; text-decoration:none; color:#64748b;">العودة للقائمة</a>
            `;
        }
        if (docId) loadProfile();
    </script>
</body>

</html>
