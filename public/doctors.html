<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إدارة الأطباء | مستشفى الياسين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* استخدم نفس تنسيقات clinics.html هنا (نسخ ولصق الـ style) */
        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #0284c7;
            color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
        }

        .btn-add {
            background: #10b981;
        }

        .btn-del {
            background: #ef4444;
        }

        .btn-view {
            background: #0284c7;
        }
    </style>
</head>

<body>
    <header>
        <h1>إدارة الكادر الطبي 👨‍⚕️</h1>
        <a href="dashboard.html" style="color:#fff;">العودة للرئيسية</a>
    </header>
    <div class="container">
        <a href="add-doctor.html" class="btn btn-add" style="display:inline-block; margin-bottom:20px;">➕ إضافة طبيب
            جديد</a>
        <table>
            <thead>
                <tr>
                    <th>الصورة</th>
                    <th>الاسم</th>
                    <th>التخصص</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="doctorsTable"></tbody>
        </table>
    </div>
    <script>
        async function loadDoctors() {
            const res = await fetch('http://localhost:5000/api/doctors');
            const doctors = await res.json();
            const tbody = document.getElementById('doctorsTable');
            tbody.innerHTML = doctors.map(doc => `
                <tr onclick="window.location.href='doctor-profile.html?id=${doc.id}'" style="cursor:pointer;">
                    <td><img src="http://localhost:5000${doc.image_url}" width="40" height="40" style="border-radius:50%"></td>
                    <td>${doc.name}</td>
                    <td>${doc.specialization}</td>
                    <td>
                        <a href="doctor-profile.html?id=${doc.id}" class="btn btn-view" onclick="event.stopPropagation()">👁️ البروفايل</a>
                        <button onclick="event.stopPropagation(); deleteDoctor(${doc.id})" class="btn btn-del">🗑️ حذف</button>
                    </td>
                </tr>
            `).join('');
        }
        async function deleteDoctor(id) {
            if (confirm("حذف الطبيب؟")) {
                await fetch('http://localhost:5000/api/doctors/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
                loadDoctors();
            }
        }
        window.onload = loadDoctors;
    </script>
</body>

</html>
