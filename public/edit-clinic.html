<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل بيانات العيادة | لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0284c7;        /* الأزرق الحيوي للمستشفى */
            --primary-dark: #0369a1;   /* الأزرق الداكن للحركات */
            --bg: #f4f6f9;             /* الخلفية الرمادية الفخمة */
            --white: #ffffff;
            --text-main: #1e293b;      /* لون النصوص الأساسي */
            --text-muted: #64748b;     /* لون النصوص الفرعي */
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
            --radius: 14px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* كارت الفورم الرئيسي للتعديل */
        .form-card {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            border-top: 6px solid var(--primary);
        }

        .form-card h2 {
            text-align: center;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 700;
        }

        .form-card p {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* عناصر الإدخال والقوائم */
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            color: var(--text-main);
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        /* زر الحفظ والتحديث */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(2, 132, 199, 0.3);
        }

        /* رابط الإلغاء والعودة للعيادات */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="form-card">
        <h2>تعديل بيانات العيادة 🏥</h2>
        <p>تحديث اسم القسم الطبي أو تعديل حالة التشغيل الحالية للفرع</p>

        <form id="editClinicForm">
            <div class="form-group">
                <label for="clinicName">اسم العيادة الطبية:</label>
                <input type="text" id="clinicName" required placeholder="مثال: عيادة الباطنية">
            </div>

            <div class="form-group">
                <label for="clinicStatus">حالة تشغيل القسم:</label>
                <select id="clinicStatus" required>
                    <option value="نشط">نشط ومتاح لاستقبال المراجعين</option>
                    <option value="غير نشط">غير نشط مؤقتاً (صيانة/توقف)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">💾 حفظ التعديلات الجديدة</button>
            <a href="clinics.html" class="back-link">❌ إلغاء وتراجع</a>
        </form>
    </div>

    <script {📦}>
        // 1. استخراج الـ ID الخاص بالعيادة المستهدفة من رابط الصفحة (URL Query Params)
        const urlParams = new URLSearchParams(window.location.search);
        const clinicId = urlParams.get('id');

        // 2. جلب البيانات القديمة للعيادة تلقائياً من مسار الـ MVC لعرضها بداخل الحقول
        async function getClinicData() {
            try {
                const response = await fetch(`http://localhost:5000/api/clinics/${clinicId}`);
                const clinic = await response.json();
                
                document.getElementById('clinicName').value = clinic.name;
                // ضبط خيار السيلكت بناءً على الحالة المخزنة بالداتابيز
                document.getElementById('clinicStatus').value = clinic.status || 'نشط';
            } catch (err) {
                console.error("خطأ في جلب بيانات العيادة القديمة:", err);
                alert("تعذر جلب بيانات العيادة من الداتابيز.");
            }
        }
        
        // تشغيل الجلب التلقائي فوراً إذا كان الـ ID متواجداً بالرابط
        if (clinicId) getClinicData();

        // 3. إرسال البيانات المعدلة بالكامل عبر الـ POST API إلى مسار الـ Controller المحدث
        document.getElementById('editClinicForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const updatedData = {
                id: clinicId,
                name: document.getElementById('clinicName').value.trim(),
                status: document.getElementById('clinicStatus').value
            };

            try {
                const response = await fetch('http://localhost:5000/api/clinics/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                
                const result = await response.json();
                if (result.success) {
                    alert("🎉 رائع! تم تحديث بيانات العيادة وحالتها بنجاح.");
                    window.location.href = 'clinics.html'; // إعادة توجيه الإداري لجدول العيادات
                } else {
                    alert("فشل التحديث: " + result.error);
                }
            } catch (err) {
                alert("حدث خطأ أثناء الاتصال بالسيرفر لتحديث البيانات.");
            }
        };
    </script>
</body>

</html>
