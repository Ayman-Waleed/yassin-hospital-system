<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد جديد | مستشفى الياسين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0284c7;        /* الأزرق الحيوي للمستشفى */
            --primary-dark: #0369a1;   /* الأزرق الداكن للحركات */
            --bg: #f4f6f9;             /* الخلفية الرمادية الفخمة المريحة */
            --white: #ffffff;
            --text-main: #1e293b;      /* لون النصوص الأساسي */
            --text-muted: #64748b;     /* لون النصوص الفرعي */
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
            --radius: 14px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* كارت فورم الحجز الرئيسي */
        .booking-card {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 460px;
            border-top: 6px solid var(--primary);
            transition: transform 0.3s;
        }

        .booking-card h2 {
            text-align: center;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
        }

        .booking-card p {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* عناصر الإدخال والقوائم المنسدلة */
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            color: var(--text-main);
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        /* حقول التاريخ والوقت في سطر واحد */
        .datetime-row {
            display: flex;
            gap: 15px;
        }

        .datetime-row .form-group {
            flex: 1;
        }

        /* زر تأكيد الحجز الفخم */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(2, 132, 199, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="booking-card">
        <h2>حجز موعد طبي 📅</h2>
        <p>الرجاء إدخال بياناتك واختيار العيادة والطبيب لتأكيد طلب حجزك</p>

        <form id="bookingForm">
            <div class="form-group">
                <label for="patientName">اسم المريض ثلاثي:</label>
                <input type="text" id="patientName" placeholder="مثال: أيمن أحمد محمد" required>
            </div>

            <div class="form-group">
                <label for="clinicSelect">العيادة الطبية المختصة:</label>
                <select id="clinicSelect" required>
                    <option value="" disabled selected>-- اختر العيادة --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="doctorSelect">الطبيب المعالج:</label>
                <select id="doctorSelect" required>
                    <option value="" disabled selected>-- اختر الطبيب --</option>
                </select>
            </div>

            <div class="datetime-row">
                <div class="form-group">
                    <label for="appDate">تاريخ الموعد:</label>
                    <input type="date" id="appDate" required>
                </div>
                <div class="form-group">
                    <label for="appTime">التوقيت المفضل:</label>
                    <input type="time" id="appTime" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">🗓️ تأكيد طلب الحجز الآن</button>
        </form>
    </div>

    <script>
        // 1. جلب قائمة العيادات عند تحميل الصفحة
        async function loadClinics() {
            try {
                const response = await fetch('http://localhost:5000/api/clinics');
                const clinics = await response.json();
                const clinicSelect = document.getElementById('clinicSelect');

                clinics.forEach(clinic => {
                    const option = document.createElement('option');
                    option.value = clinic.id;
                    option.textContent = clinic.name;
                    clinicSelect.appendChild(option);
                });
            } catch (err) {
                console.error("خطأ في جلب العيادات:", err);
            }
        }

        // 2. تحديث قائمة الأطباء فوراً عند اختيار عيادة محددة
        document.getElementById('clinicSelect').onchange = async function () {
            const clinicId = this.value;
            const doctorSelect = document.getElementById('doctorSelect');

            doctorSelect.innerHTML = '<option value="" disabled selected>-- اختر الطبيب --</option>';

            try {
                const response = await fetch(`http://localhost:5000/api/doctors/by-clinic/${clinicId}`);
                const doctors = await response.json();

                if (doctors.length === 0) {
                    const option = document.createElement('option');
                    option.disabled = true;
                    option.textContent = "لا يوجد أطباء متاحين في هذه العيادة حالياً";
                    doctorSelect.appendChild(option);
                    return;
                }

                doctors.forEach(doc => {
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = doc.name;
                    doctorSelect.appendChild(option);
                });
            } catch (err) {
                console.error("خطأ في جلب أطباء العيادة:", err);
            }
        };

        // 3. معالجة إرسال طلب الحجز إلى الـ MVC Backend المحدث
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();

            const dateVal = document.getElementById('appDate').value;
            const timeVal = document.getElementById('appTime').value;

            if (!document.getElementById('clinicSelect').value || !document.getElementById('doctorSelect').value || !dateVal || !timeVal) {
                alert("الرجاء تعبئة جميع الحقول واختيار العيادة والطبيب قبل تأكيد الحجز.");
                return;
            }

            // دمج التاريخ والوقت في صيغة موحدة مقبولة برمجياً لقاعدة البيانات
            const fullDateTime = `${dateVal} ${timeVal}`;

            const data = {
                patient_name: document.getElementById('patientName').value,
                doctor_id: document.getElementById('doctorSelect').value,
                appointment_date: fullDateTime
            };

            try {
                const response = await fetch('http://localhost:5000/api/appointments/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.success) {
                    alert("📍 شكراً لك! تم استلام طلب الحجز بنجاح، وهو قيد المراجعة الإدارية الآن.");
                    e.target.reset();
                } else {
                    alert("حدث خطأ أثناء الحجز: " + result.error);
                }
            } catch (err) {
                alert("حدث خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً");
            }
        };

        // بدء تشغيل دالة جلب العيادات فور فتح المريض للصفحة
        window.onload = loadClinics;
    </script>
</body>

</html>
