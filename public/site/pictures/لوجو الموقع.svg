<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <!-- لوجو الياسين الطبي — مستوحى من الشعار الأصلي:
       قلب أزرق بألوان الكرة الأرضية، صليب طبي فاتح، أوراق خضراء متناظرة،
       وشريط أخضر باسم "الياسين" بنص أبيض ليعمل على الخلفيات الفاتحة والداكنة -->
  <defs>
    <linearGradient id="earth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fa3dd"/>
      <stop offset="0.55" stop-color="#2e78bd"/>
      <stop offset="1" stop-color="#1b4e8a"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a9a66"/>
      <stop offset="1" stop-color="#2b7a4f"/>
    </linearGradient>
    <clipPath id="heartClip">
      <path d="M460,152 C418,116 393,92 393,63 C393,39 412,25 434,25 C447,25 456,31 460,40 C464,31 473,25 486,25 C508,25 527,39 527,63 C527,92 502,116 460,152 Z"/>
    </clipPath>
  </defs>

  <!-- الأوراق الخضراء المتناظرة حول القلب: غصن مقوس تتوزع عليه
       وريقات متبادلة ملتصقة بالساق (داخلية داكنة وخارجية أفتح) -->
  <g>
    <g id="branch">
      <path d="M404,124 Q352,108 336,52" fill="none" stroke="#2e8b57" stroke-width="5" stroke-linecap="round"/>
      <path d="M336,52 Q322,38 326,20 Q344,26 340,46 Z" fill="#2e8b57"/>
      <path d="M342,68 Q324,60 318,42 Q338,42 346,58 Z" fill="#43a06b"/>
      <path d="M348,66 Q360,48 354,32 Q338,44 340,60 Z" fill="#2e8b57"/>
      <path d="M354,88 Q334,84 324,68 Q344,64 356,78 Z" fill="#2e8b57"/>
      <path d="M360,86 Q374,72 372,54 Q354,62 352,78 Z" fill="#43a06b"/>
      <path d="M372,106 Q352,104 340,90 Q360,84 372,96 Z" fill="#43a06b"/>
      <path d="M378,104 Q392,92 392,74 Q374,80 370,96 Z" fill="#2e8b57"/>
      <path d="M394,118 Q376,120 362,110 Q378,100 392,108 Z" fill="#2e8b57"/>
    </g>
    <use href="#branch" transform="translate(920,0) scale(-1,1)"/>
  </g>

  <!-- القلب بألوان الكرة الأرضية -->
  <path d="M460,152 C418,116 393,92 393,63 C393,39 412,25 434,25 C447,25 456,31 460,40 C464,31 473,25 486,25 C508,25 527,39 527,63 C527,92 502,116 460,152 Z"
        fill="url(#earth)"/>
  <!-- قارات مبسطة داخل القلب -->
  <g clip-path="url(#heartClip)">
    <path d="M405,45 q18,-12 34,-2 q6,10 -6,16 q-20,6 -30,-2 Z" fill="#7fc9ee" opacity="0.85"/>
    <path d="M498,38 q16,-4 22,8 q4,12 -10,16 q-16,2 -20,-10 q-2,-10 8,-14 Z" fill="#7fc9ee" opacity="0.8"/>
    <path d="M420,105 q14,-8 26,2 q8,10 -4,18 q-16,8 -26,-4 q-6,-10 4,-16 Z" fill="#164a7d" opacity="0.7"/>
    <path d="M500,95 q12,-6 18,4 q4,10 -8,16 q-14,4 -18,-6 q-2,-10 8,-14 Z" fill="#164a7d" opacity="0.6"/>
  </g>
  <!-- الصليب الطبي الفاتح -->
  <g fill="#ddf0fb">
    <rect x="449" y="50" width="22" height="66" rx="7"/>
    <rect x="427" y="72" width="66" height="22" rx="7"/>
  </g>

  <!-- شريط الاسم -->
  <rect x="36" y="70" width="286" height="60" rx="14" fill="url(#ribbon)"/>
  <text x="179" y="112" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="900"
        font-family="'Cairo','Segoe UI',Tahoma,sans-serif" direction="rtl">الياسين</text>
</svg>
